<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Spelling Practice</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<style>
body{
 font-family:system-ui,sans-serif;
 background:#e0e7ff;
 padding:16px;
}
.container{
 max-width:1000px;
 margin:auto;
 background:#fff;
 padding:26px;
 border-radius:18px;
 box-shadow:0 12px 30px rgba(0,0,0,.12);
}
.hidden{display:none}
h1,h2,h3{text-align:center;color:#1e3a8a}
table{width:100%;border-collapse:collapse;margin-top:16px}
th,td{padding:12px;border-bottom:1px solid #e5e7eb;text-align:center}
th{background:#e0e7ff}
input{
 width:100%;
 padding:14px;
 border-radius:14px;
 border:1px solid #cbd5f5;
 margin:12px 0;
 font-size:1.2rem;
}
button{
 padding:10px 18px;
 border-radius:12px;
 border:none;
 font-weight:700;
 color:#fff;
 background:#2563eb;
 cursor:pointer;
}
button.secondary{background:#0f766e}
.feedback{text-align:center;font-weight:700;margin-top:12px}
.score{font-size:2rem;font-weight:900;text-align:center}

/* ================= ON-SCREEN KEYBOARD ================= */
#keyboard{
 display:none;
 margin-top:12px;
 text-align:center;
}
.key{
 display:inline-block;
 width:50px;
 height:50px;
 margin:4px;
 line-height:50px;
 background:#dbeafe;
 color:#1e3a8a;
 font-weight:700;
 border-radius:8px;
 cursor:pointer;
 user-select:none;
}
.key.wide{width:110px}
</style>

<style>
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;margin-top:20px}
.spelling-card{background:#fff;border:1px solid #dbeafe;border-radius:16px;padding:18px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
.spelling-card h3{margin:0 0 10px;color:#1e3a8a}
.spelling-card p{margin:6px 0}
@media(max-width:600px){.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">

<!-- LOGIN -->
<div id="loginBox">
 <h1>Student Login</h1>
 <input id="email" placeholder="Email">
 <input id="password" type="password" placeholder="Password">
 <button onclick="login()">Login</button>
 <div class="feedback" id="loginMsg"></div>
</div>

<!-- STUDENT INFO & SPELLING SELECTION -->
<div id="selectBox" class="hidden">
 <h2>Welcome, <span id="studentName"></span> (Class: <span id="studentClass"></span>)</h2>
 <p id="instruction">Click "Start" to begin a spelling list. Listen to the word, type it, and submit.</p>

<div id="spellingTable" class="cards"></div>
</div>

<!-- SPELLING APP -->
<div id="app" class="hidden">
 <h2 id="remaining"></h2>
 <input id="answer" placeholder="Type spelling" autocorrect="off" spellcheck="false" readonly>
 <div id="keyboard" class="hidden"></div>

 <div style="text-align:center;margin:12px">
   <button onclick="playWord()">Word</button>
   <button onclick="playMeaning()">Meaning</button>
   <button onclick="playSentence()">Sentence</button>
 </div>
 <div style="text-align:center">
   <button onclick="submitAnswer()">Submit</button>
   <button onclick="retake()" id="retakeBtn" class="secondary hidden">Retake</button>
 </div>
 <div class="feedback" id="feedback"></div>

 <div id="final" class="hidden">
   <div class="score" id="scoreBox"></div>
   <div id="missedBox"></div>
 </div>

 <h3>Previous Attempts</h3>
 <table>
   <thead>
     <tr><th>Date</th><th>Score</th><th>%</th></tr>
   </thead>
   <tbody id="resultsTable"></tbody>
 </table>
</div>

<script>
/* ================= FIREBASE ================= */
firebase.initializeApp({
 apiKey:"AIzaSyB4DMYZJHWgbRUZV-uamOy7TpxLM1sGYPY",
 authDomain:"chats-afcff.firebaseapp.com",
 databaseURL:"https://chats-afcff-default-rtdb.firebaseio.com",
 projectId:"chats-afcff"
});
const auth = firebase.auth();
const db = firebase.database();
const synth = speechSynthesis;

/* ================= STATE ================= */
let student={}, spellingId=null, words=[], index=0, score=0, missed=[];

/* ================= LOGIN ================= */
function login(){
 loginMsg.textContent="";
 auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>loginMsg.textContent=e.message);
}

auth.onAuthStateChanged(async user=>{
 if(!user) return;
 loginBox.classList.add("hidden");

 const snap = await db.ref("students/"+user.uid).once("value");
 if(!snap.exists()) return alert("Student record not found");

 student = {
   id: user.uid,
   name: snap.val().name || "Student",
   className: (snap.val().class||"").trim().toUpperCase()
 };

 document.getElementById("studentName").textContent = student.name;
 document.getElementById("studentClass").textContent = student.className;

 loadAssignedSpellings();
});

/* ================= LOAD ASSIGNED SPELLINGS ================= */
function loadAssignedSpellings(){
 selectBox.classList.remove("hidden");
 spellingTable.innerHTML="";
 let found=false;

 db.ref("spellingLists").once("value", snap=>{
   snap.forEach(s=>{
     const d = s.val();
     if(!d.words) return;

     const listClass = (d.className||"").trim().toUpperCase();
     const locked = d.lockDate && Date.now() > d.lockDate;

     const classMatch = d.targetType==="class" && listClass===student.className;
     const studentMatch = d.targetType==="student" && d.studentId===student.id;

     if((classMatch || studentMatch) && !locked){
       found=true;
const card=document.createElement("div");
card.className="spelling-card";
card.innerHTML=`
<h3>📖 ${d.title}</h3>
<p><b>🎯 Target:</b> ${d.targetType}</p>
<p><b>🏫 Class:</b> ${d.className||"-"}</p>
<p><b>👤 Student:</b> ${d.studentId||"-"}</p>
<p><b>📝 Words:</b> ${Object.keys(d.words).length}</p>
<p><b>🔒 Lock:</b> ${d.lockDate?new Date(d.lockDate).toLocaleDateString():"-"}</p>
<div style="text-align:center;margin-top:14px"><button onclick="startSpelling('${s.key}')">▶ Start</button></div>`;
spellingTable.appendChild(card);
     }
   });

   if(!found){
     spellingTable.innerHTML="<div class='spelling-card'><h3>No spelling assigned.</h3></div>";
   }
 });
}

/* ================= START SPELLING ================= */
function startSpelling(id){
 spellingId = id;
 db.ref(`spellingLists/${id}/words`).once("value", snap=>{
   words = Object.entries(snap.val()||{}).map(([id,w])=>({
     id,
     word: w.word,
     meaning: w.meaning||"",
     sentence: w.sentence||""
   })).filter(w=>w.word);

   index=0; score=0; missed=[];
   selectBox.classList.add("hidden");
   app.classList.remove("hidden");
   final.classList.add("hidden");
   retakeBtn.classList.add("hidden");

   loadResults();
   playWord();
 });
}

/* ================= SPEECH ================= */
function speak(text){
 if(!text) return;
 synth.cancel();
 synth.speak(new SpeechSynthesisUtterance(text));
}
function playWord(){ 
 answer.value=""; 
 feedback.textContent=""; 
 remaining.textContent=`Word ${index+1} of ${words.length}`; 
 speak(words[index].word); 
 hideKeyboard(); // hide keyboard on new word
}
function playMeaning(){ speak(words[index].meaning); }
function playSentence(){ speak(words[index].sentence); }

/* ================= SUBMIT ================= */
function submitAnswer(){
 const a = answer.value.trim().toLowerCase();
 if(!a) return feedback.textContent="Type the word";

 const correct = words[index].word.toLowerCase();
 if(a===correct){ score++; feedback.textContent="Correct!"; updateWordStats(words[index].id,false); }
 else { missed.push(correct); feedback.textContent="Wrong: "+correct; updateWordStats(words[index].id,true); }

 index++;
 index<words.length ? playWord() : finish();
}

/* ================= ANALYTICS ================= */
function updateWordStats(id,miss){
 db.ref(`spellingLists/${spellingId}/analytics/wordStats/${id}`).transaction(v=>{
   v = v||{attempts:0, misses:0}; v.attempts++; if(miss) v.misses++; return v;
 });
}

/* ================= FINISH ================= */
function finish(){
 const pct = Math.round(score/words.length*100);
 final.classList.remove("hidden");
 retakeBtn.classList.remove("hidden");
 scoreBox.textContent=`${score}/${words.length} (${pct}%)`;
 missedBox.innerHTML = missed.length ? `Missed:<ul>${missed.map(w=>`<li>${w}</li>`).join("")}</ul>` : "Perfect score 🎉";

 db.ref(`studentAttempts/${student.id}/${spellingId}`).push({
   score, total:words.length, percentage:pct, missedWords:missed, timestamp:Date.now()
 });

 loadResults();
}

/* ================= RESULTS ================= */
function loadResults(){
 resultsTable.innerHTML="";
 db.ref(`studentAttempts/${student.id}/${spellingId}`).once("value",snap=>{
   snap.forEach(r=>{
     const d=r.val();
     resultsTable.innerHTML+=`
       <tr>
         <td>${new Date(d.timestamp).toLocaleString()}</td>
         <td>${d.score}/${d.total}</td>
         <td>${d.percentage}%</td>
       </tr>`;
   });
 });
}

/* ================= RETAKE ================= */
function retake(){
 index=0; score=0; missed=[];
 final.classList.add("hidden");
 retakeBtn.classList.add("hidden");
 playWord();
}

/* ================== ON-SCREEN KEYBOARD ================== */
const answer = document.getElementById("answer");
const keyboard = document.getElementById("keyboard");

// Build keyboard keys
const keys = [
  'Q','W','E','R','T','Y','U','I','O','P',
  'A','S','D','F','G','H','J','K','L',
  'Z','X','C','V','B','N','M',
  'Backspace','Space'
];

function buildKeyboard(){
  keyboard.innerHTML = '';
  keys.forEach(k=>{
    const btn = document.createElement('div');
    btn.textContent = k==='Space' ? '␣' : k;
    btn.className = 'key';
    if(k==='Backspace') btn.classList.add('wide');
    if(k==='Space') btn.classList.add('wide');
    btn.onclick = ()=>pressKey(k);
    keyboard.appendChild(btn);
  });
}

function pressKey(k){
  if(k==='Backspace') answer.value = answer.value.slice(0,-1);
  else if(k==='Space') answer.value += ' ';
  else answer.value += k;
  answer.focus();
}

function showKeyboard(){ keyboard.style.display='block'; }
function hideKeyboard(){ keyboard.style.display='none'; }

// Show keyboard on input focus
answer.addEventListener('focus',showKeyboard);

buildKeyboard();
</script>
</body>
</html>
